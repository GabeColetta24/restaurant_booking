<!-- Template for displaying the booking form -->
{% extends "bookings/base.html" %}
{% load static %}

{% block content %}

<h1>Book a Table</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit Booking</button>
</form>

<!-- Footer Section -->
<footer style="text-align: center; margin-top: 20px;">
    <!-- Span where the current year will be inserted -->
    &copy; <span id="year"></span> Restaurant Booking System
</footer>
  
<!-- JavaScript to insert the current year dynamically -->
<script>
    // Get the span element by ID and set its text content to the current year
    document.getElementById("year").textContent = new Date().getFullYear();
</script>  

{% endblock %}
