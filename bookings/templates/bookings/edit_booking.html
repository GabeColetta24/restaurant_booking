{% extends "bookings/base.html" %}

{% block content %}

<!-- Page heading -->
<h2>Edit Booking</h2>

<!-- Form for updating an existing booking -->
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    
    <!-- Submit button -->
    <button type="submit">Update Booking</button>
</form>

<!-- Navigation back to bookings -->
<p><a href="{% url 'my_bookings' %}">Back to My Bookings</a></p>
{% endblock %}
